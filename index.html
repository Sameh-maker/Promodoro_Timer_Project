<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pomodoro Timer</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <h1 class="title">pomodoro timer</h1>
        <p class="enjoy">
            enjoy your study
        </p>
        <div class="timeContainer">
            <div class="minutes">
                <p class="timeCategory">minutes</p>
                <h1 class="timeNumber">25</h1>
            </div>
            <div class="seconds">
                <p class="timeCategory">seconds</p>
                <h1 class="timeNumber">00</h1>
            </div>
        </div>
        <div class="buttons">
            <button class="startBtn">start</button>
            <button class="pauseBtn">pause</button>
            <button class="restartBtn">restart</button>
        </div>
        <div class="message">
            <p>well done, great effort, time to break</p>
            <img class="msgImg"
                src="./images&audios/break-breaktime-coffee-icon-black-vector-graphics_1178600-10163.avif">
        </div>
    </div>

    <script src="./logic.js"></script>
</body>

</html>
